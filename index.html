<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Three.js Visualization</title>
    <style>
        body { margin: 0; background-color: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            display:block;
            pointer-events: none;
        }
        #loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            text-align: center;
            z-index: 200;
        }
        #progress-bar-container {
            width: 100%;
            height: 20px;
            background: #222;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid #444;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #007bff;
            transition: width 0.1s;
        }
        .label {
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 12px;
            pointer-events: none;
        }
        #controls-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            pointer-events: auto;
            z-index: 100;
        }
        #controls-info h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #007bff;
        }
        .control-item {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .control-key {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="info">International Space Station - Three.js Visualization</div>
    <div id="loading-container">
        <div>Loading ISS Model...</div>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="controls-info">
        <h3>Controls</h3>
        <div class="control-item"><span class="control-key">Rotate:</span> Left Click / 1 Finger</div>
        <div class="control-item"><span class="control-key">Zoom:</span> Scroll / Pinch</div>
        <div class="control-item"><span class="control-key">Pan:</span> Right Click / 2 Fingers</div>
        <div class="control-item"><span class="control-key">Arrows:</span> Rotate Camera</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { OutlinePass } from 'three/addons/postprocessing/OutlinePass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        let scene, camera, renderer, controls, composer, outlinePass;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 10, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1;
            document.body.appendChild(renderer.domElement);

            // Post-processing
            composer = new EffectComposer(renderer);
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            outlinePass = new OutlinePass(new THREE.Vector2(window.innerWidth, window.innerHeight), scene, camera);
            outlinePass.edgeStrength = 5;
            outlinePass.edgeGlow = 1;
            outlinePass.edgeThickness = 2;
            outlinePass.visibleEdgeColor.set('#ffff00');
            outlinePass.hiddenEdgeColor.set('#190a05');
            composer.addPass(outlinePass);

            const outputPass = new OutputPass();
            composer.addPass(outputPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5);
            directionalLight.position.set(10, 20, 15);
            scene.add(directionalLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const fillLight = new THREE.DirectionalLight(0xffffff, 1.0);
            fillLight.position.set(-10, -10, -10);
            scene.add(fillLight);

            // Loader
            const loader = new GLTFLoader();
            const progressBar = document.getElementById('progress-bar');
            const loadingContainer = document.getElementById('loading-container');

            loader.load('iss_model.glb', function (gltf) {
                const model = gltf.scene;
                
                // Center model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                
                scene.add(model);
                
                console.log('Model loaded', model);
                
                // Adjust camera based on size
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.set(maxDim, maxDim/2, maxDim);
                controls.update();

                // Hide loading UI
                loadingContainer.style.display = 'none';

            }, function (xhr) {
                if (xhr.lengthComputable) {
                    const percentComplete = (xhr.loaded / xhr.total) * 100;
                    progressBar.style.width = percentComplete + '%';
                }
            }, function (error) {
                console.error(error);
                loadingContainer.innerHTML = 'Error loading model';
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('click', onPointerClick);
        }

        function onPointerClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                const selectedObject = intersects[0].object;
                outlinePass.selectedObjects = [selectedObject];
                console.log('Clicked on:', selectedObject.name);
            } else {
                outlinePass.selectedObjects = [];
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            composer.render();
        }
    </script>
</body>
</html>
