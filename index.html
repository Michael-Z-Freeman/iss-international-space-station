<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Three.js Visualization</title>
    <style>
        body { margin: 0; background-color: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            display:block;
            pointer-events: none;
        }
        #loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            text-align: center;
            z-index: 200;
        }
        #progress-bar-container {
            width: 100%;
            height: 20px;
            background: #222;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid #444;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #007bff;
            transition: width 0.1s;
        }
        .label {
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 12px;
            pointer-events: none;
        }
        #controls-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            pointer-events: auto;
            z-index: 100;
        }
        #controls-info h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #007bff;
        }
        .control-item {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .control-key {
            color: #aaa;
        }
        #wiki-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #444;
            padding: 20px;
            border-radius: 8px;
            display: none;
            z-index: 150;
            max-height: 70vh;
            overflow-y: auto;
        }
        #wiki-overlay h2 {
            margin-top: 0;
            font-size: 18px;
            color: #007bff;
        }
        #wiki-overlay p {
            font-size: 14px;
            line-height: 1.5;
            color: #eee;
        }
        #wiki-overlay .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            color: #888;
            font-size: 20px;
        }
        #wiki-overlay img {
            width: 100%;
            height: auto;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .edit-name-btn {
            display: inline-block;
            margin-top: 10px;
            font-size: 11px;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
        }
        .edit-name-btn:hover {
            color: #007bff;
        }
    </style>
</head>
<body>
    <div id="info">International Space Station - Three.js Visualization</div>
    <div id="loading-container">
        <div>Loading ISS Model...</div>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="controls-info">
        <h3>Controls</h3>
        <div class="control-item"><span class="control-key">Rotate:</span> Left Click / 1 Finger</div>
        <div class="control-item"><span class="control-key">Zoom:</span> Scroll / Pinch</div>
        <div class="control-item"><span class="control-key">Pan:</span> Right Click / 2 Fingers</div>
        <div class="control-item"><span class="control-key">Arrows:</span> Rotate Camera</div>
    </div>

    <div id="wiki-overlay">
        <span class="close-btn">&times;</span>
        <div id="wiki-content">
            <h2>Select a module</h2>
            <p>Click on a part of the ISS to see information from Wikipedia.</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { OutlinePass } from 'three/addons/postprocessing/OutlinePass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        let scene, camera, renderer, controls, composer, outlinePass, issModel;
        const partByObject = new WeakMap();
        const selectableObjects = new WeakSet();
        let needsRender = true;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let customNames = JSON.parse(localStorage.getItem('iss_custom_names') || '{}');
        const debugSelection = new URLSearchParams(window.location.search).has('debugSelection');

        init();
        animate();

        function requestRender() {
            needsRender = true;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 10, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1;
            document.body.appendChild(renderer.domElement);

            // Post-processing
            composer = new EffectComposer(renderer);
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            outlinePass = new OutlinePass(new THREE.Vector2(window.innerWidth, window.innerHeight), scene, camera);
            outlinePass.edgeStrength = 5;
            outlinePass.edgeGlow = 1;
            outlinePass.edgeThickness = 2;
            outlinePass.visibleEdgeColor.set('#ffff00');
            outlinePass.hiddenEdgeColor.set('#190a05');
            composer.addPass(outlinePass);

            const outputPass = new OutputPass();
            composer.addPass(outputPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Persistency: Save view state on end of interaction
            controls.addEventListener('end', () => {
                const state = {
                    position: camera.position,
                    target: controls.target
                };
                localStorage.setItem('iss_view_state', JSON.stringify(state));
            });

            // On-demand rendering: render only when controls change
            controls.addEventListener('change', requestRender);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5);
            directionalLight.position.set(10, 20, 15);
            scene.add(directionalLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const fillLight = new THREE.DirectionalLight(0xffffff, 1.0);
            fillLight.position.set(-10, -10, -10);
            scene.add(fillLight);

            // Loader
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');

            const ktx2Loader = new KTX2Loader();
            ktx2Loader.setTranscoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/basis/');
            ktx2Loader.detectSupport(renderer);

            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);
            loader.setKTX2Loader(ktx2Loader);

            const progressBar = document.getElementById('progress-bar');
            const loadingContainer = document.getElementById('loading-container');

            loader.load('International Space Station (ISS).draco.glb', function (gltf) {
                const model = gltf.scene;
                issModel = model;
                
                // Optimizations: Force FrontSide rendering for backface culling
                /*
                model.traverse((node) => {
                    if (node.isMesh) {
                        if (Array.isArray(node.material)) {
                            node.material.forEach(mat => mat.side = THREE.FrontSide);
                        } else if (node.material) {
                            node.material.side = THREE.FrontSide;
                        }
                    }
                });
                */

                // Center model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                
                scene.add(model);
                buildPartIndex(model);
                
                console.log('Model loaded', model);
                
                // Persistency: Restore View State
                const savedView = localStorage.getItem('iss_view_state');
                if (savedView) {
                    const state = JSON.parse(savedView);
                    camera.position.set(state.position.x, state.position.y, state.position.z);
                    controls.target.set(state.target.x, state.target.y, state.target.z);
                } else {
                    // Default camera view if no state saved
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    camera.position.set(maxDim, maxDim/2, maxDim);
                }
                controls.update();
                requestRender();

                // Persistency: Restore Selection
                const savedPartName = localStorage.getItem('iss_selected_part');
                if (savedPartName) {
                    const savedObj = model.getObjectByName(savedPartName);
                    if (savedObj) {
                        const outlineTarget = findFirstMesh(savedObj) || savedObj;
                        outlinePass.selectedObjects = [outlineTarget];
                        fetchWikiInfo(savedObj.name || savedPartName);
                        requestRender();
                    }
                }

                // Hide loading UI
                loadingContainer.style.display = 'none';

            }, function (xhr) {
                if (xhr.lengthComputable) {
                    const percentComplete = (xhr.loaded / xhr.total) * 100;
                    progressBar.style.width = percentComplete + '%';
                }
            }, function (error) {
                console.error(error);
                loadingContainer.innerHTML = 'Error loading model';
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('click', onPointerClick);

            document.querySelector('#wiki-overlay .close-btn').addEventListener('click', () => {
                document.getElementById('wiki-overlay').style.display = 'none';
                outlinePass.selectedObjects = [];
                requestRender();
            });
        }

        const ignoreNamePatterns = [
            /details/i,
            /rgba/i,
            /misc/i,
            /collection/i,
            /ik reference goal/i,
            /_details_/i,
            /[_ -]\\d+$/i
        ];

        function getObjectName(obj) {
            if (!obj) return '';
            return obj.name || obj.userData?.name || obj.geometry?.name || obj.material?.name || '';
        }

        function isGoodInfoName(name) {
            if (!name) return false;
            if (ignoreNamePatterns.some((pattern) => pattern.test(name))) return false;
            return true;
        }

        function isSelectableObject(obj) {
            if (!obj || !obj.isMesh) return false;
            const name = getObjectName(obj);
            return isGoodInfoName(name);
        }

        function buildPartIndex(root) {
            root.traverse((obj) => {
                if (isSelectableObject(obj)) selectableObjects.add(obj);
            });

            root.traverse((obj) => {
                let current = obj;
                while (current && current !== root && !selectableObjects.has(current)) {
                    current = current.parent;
                }
                const resolved = (current && selectableObjects.has(current)) ? current : obj;
                partByObject.set(obj, resolved);
            });
        }

        function findInfoNode(node) {
            const resolved = partByObject.get(node);
            if (resolved) return resolved;
            let current = node;
            while (current && current.parent && current.parent.type !== 'Scene') {
                if (isGoodInfoName(getObjectName(current))) return current;
                current = current.parent;
            }
            return node;
        }

        function findFirstMesh(node) {
            if (!node) return null;
            if (node.isMesh) return node;

            let found = null;
            node.traverse((child) => {
                if (!found && child.isMesh) found = child;
            });
            return found;
        }

        function getObjectPath(node) {
            const names = [];
            let current = node;
            while (current) {
                const name = getObjectName(current) || '(unnamed)';
                names.push(name);
                if (current.parent && current.parent.type === 'Scene') {
                    names.push('Scene');
                    break;
                }
                current = current.parent;
            }
            return names.reverse().join(' > ');
        }

        async function fetchWikiInfo(objName) {
            const overlay = document.getElementById('wiki-overlay');
            const content = document.getElementById('wiki-content');
            
            // Use custom name if it exists
            const displayName = customNames[objName] || objName;
            
            overlay.style.display = 'block';
            content.innerHTML = '<h2>Loading...</h2><p>Fetching data from Wikipedia...</p>';

            console.log('Fetching for:', displayName);

            // Map specific technical names to better wiki titles
            const nameMap = {
                'Zarya': 'Zarya',
                'Zvezda': 'Zvezda (ISS module)',
                'Unity': 'Unity (ISS module)',
                'Destiny': 'Destiny (ISS module)',
                'Harmony': 'Harmony (ISS module)',
                'Tranquility': 'Tranquility (ISS module)',
                'Columbus': 'Columbus (ISS module)',
                'Kibo': 'Kibo (ISS module)',
                'Cupola': 'Cupola (ISS module)',
                'Quest': 'Quest Joint Airlock',
                'Pirs': 'Pirs (ISS module)',
                'Poisk': 'Poisk (ISS module)',
                'Rassvet': 'Rassvet (ISS module)',
                'Leonardo': 'Leonardo (ISS module)',
                'Canadarm2': 'Canadarm2',
                'DEXTRE': 'Dextre',
                'AMS2': 'Alpha Magnetic Spectrometer',
                'ESP': 'External Stowage Platform',
                'ELC': 'ExPRESS Logistics Carrier',
                'RapidScat': 'ISS-RapidScat',
                'ECOStress': 'ECOSTRESS',
                'OCO3': 'Orbiting Carbon Observatory 3',
                'CATS': 'Cloud-Aerosol Transport System',
                'ASIM': 'Atmosphere-Space Interactions Monitor'
            };

            let wikiTitle = null;
            let trussSection = null;

            // Check if it's a truss segment first
            if (objName.includes('Truss')) {
                wikiTitle = 'Integrated Truss Structure';
                if (objName.includes('S0')) trussSection = "S0 truss";
                else if (objName.includes('S1') || objName.includes('P1')) trussSection = "S1 and P1 trusses";
                else if (objName.includes('P3') || objName.includes('S3')) trussSection = "P3 and S3 trusses";
                else if (objName.includes('P4') || objName.includes('S4')) trussSection = "P4 and S4 trusses";
                else if (objName.includes('P5') || objName.includes('S5')) trussSection = "P5 and S5 trusses";
                else if (objName.includes('P6') || objName.includes('S6')) trussSection = "P6 and S6 trusses";
                else if (objName.includes('Z1')) trussSection = "Z1 truss";
            } else {
                for (let key in nameMap) {
                    if (objName.includes(key)) {
                        wikiTitle = nameMap[key];
                        break;
                    }
                }
            }

            // Final fallback: clean up the string if no mapping found
            if (!wikiTitle) {
                const cleaned = objName.replace(/^_[0-9]_+/, '').replace(/_+/g, ' ').trim();
                const parenMatch = cleaned.match(/\(([^)]+)\)/);
                wikiTitle = parenMatch ? parenMatch[1].trim() : cleaned;
            }

            console.log('Target Wiki Title:', wikiTitle, 'Truss Section:', trussSection);

            try {
                // If it's a truss segment, we'll try to get the summary of the main page 
                // but prepend the section name to make it clear what we're looking at.
                const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`;
                console.log('Fetching URL:', url);
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();

                if (data.title && data.extract) {
                    let displayTitle = trussSection ? `${trussSection.toUpperCase()}` : data.title;
                    let displayUrl = trussSection 
                        ? `https://en.wikipedia.org/wiki/Integrated_Truss_Structure#${encodeURIComponent(trussSection.replace(/ /g, '_'))}`
                        : data.content_urls.desktop.page;

                    content.innerHTML = `
                        <h2>${displayTitle}</h2>
                        ${data.thumbnail ? `<img src="${data.thumbnail.source}" />` : ''}
                        <p>${data.extract}</p>
                        <p style="font-size: 0.9em; color: #888;">(Summary from ${data.title})</p>
                        <p><a href="${displayUrl}" target="_blank" style="color: #007bff;">Read more on Wikipedia</a></p>
                        <div class="edit-name-btn" id="rename-link">✎ Rename this model part in view</div>
                    `;
                    
                    document.getElementById('rename-link').onclick = () => {
                        const newName = prompt(`Enter a more descriptive name for this part (Current: ${displayName}):`, displayName);
                        if (newName && newName !== displayName) {
                            customNames[objName] = newName;
                            localStorage.setItem('iss_custom_names', JSON.stringify(customNames));
                            fetchWikiInfo(objName);
                        }
                    };
                } else {
                    content.innerHTML = `<h2>${displayName}</h2><p>No Wikipedia article found for "${wikiTitle}".</p>
                        <div class="edit-name-btn" id="rename-link">✎ Rename this model part in view</div>`;
                    
                    document.getElementById('rename-link').onclick = () => {
                        const newName = prompt(`Enter a more descriptive name for this part:`, displayName);
                        if (newName && newName !== displayName) {
                            customNames[objName] = newName;
                            localStorage.setItem('iss_custom_names', JSON.stringify(customNames));
                            fetchWikiInfo(objName);
                        }
                    };
                }
            } catch (error) {
                console.error('Fetch error:', error);
                content.innerHTML = `<h2>Error</h2><p>Could not load info for "${wikiTitle}".<br><small>${error.message}</small></p>
                    <div class="edit-name-btn" id="rename-link">✎ Rename this model part in view</div>`;
                
                document.getElementById('rename-link').onclick = () => {
                    const newName = prompt(`Enter a more descriptive name for this part:`, displayName);
                    if (newName && newName !== displayName) {
                        customNames[objName] = newName;
                        localStorage.setItem('iss_custom_names', JSON.stringify(customNames));
                        fetchWikiInfo(objName);
                    }
                };
            }
        }

        function onPointerClick(event) {
            // Don't trigger if clicking the overlay itself
            if (event.target.closest('#wiki-overlay') || event.target.closest('#controls-info')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            if (!issModel) return;
            const intersects = raycaster.intersectObject(issModel, true);

            if (intersects.length > 0) {
                const selectedObject = intersects[0].object;
                
                // Find the best node to select:
                // 1. Walk up from the mesh.
                // 2. Stop at the first node that DOES NOT contain "details" in its name.
                // 3. If we hit "SSREF_IGOAL", stop at the node just below it (to pick the major module).
                
                const outlineTarget = selectedObject.isMesh ? selectedObject : (findFirstMesh(selectedObject) || selectedObject);
                const infoNode = findInfoNode(selectedObject) || findInfoNode(outlineTarget);
                
                outlinePass.selectedObjects = [outlineTarget];
                const infoName = infoNode.name || selectedObject.name;
                if (debugSelection) {
                    console.log('[Selection]', {
                        hit: selectedObject.name,
                        resolved: infoName,
                        path: getObjectPath(selectedObject)
                    });
                }
                fetchWikiInfo(infoName);
                localStorage.setItem('iss_selected_part', infoName);
                requestRender();
            } else {
                outlinePass.selectedObjects = [];
                document.getElementById('wiki-overlay').style.display = 'none';
                localStorage.removeItem('iss_selected_part');
                requestRender();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            requestRender();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // OrbitControls with damping returns true if damping is still active
            const controlsUpdating = controls.update();
            
            if (controlsUpdating || needsRender) {
                composer.render();
                needsRender = false;
            }
        }
    </script>
</body>
</html>
